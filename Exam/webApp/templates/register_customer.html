{% extends "base.html" %}
{% block title %}Register Customer - StageUp{% endblock %}
{% block content %}
<div class="container form-container">
    <h2>Register New Customer</h2>
    <form method="POST">
        <div class="form-group">
            <label for="cust_id">Customer ID:</label>
            <input type="text" id="cust_id" name="cust_id" placeholder="e.g. CUST001" required>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Full name or company name" required>
        </div>
        <div class="form-group">
            <label for="cust_type">Customer Type:</label>
            <select id="cust_type" name="cust_type" required>
                <option value="Individual">Individual</option>
                <option value="Company">Company</option>
            </select>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. 3331234567">
        </div>
        <div class="form-group">
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="e.g. Via Roma 1, Milano">
        </div>
        <button type="submit" class="btn">Register</button>
        <a href="{{ url_for('index') }}" class="btn">Back</a>
    </form>
</div>
{% endblock %}
