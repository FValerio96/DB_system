{% extends "base.html" %}
{% block title %}Add Member - SageFit{% endblock %}
{% block content %}
<div class="container form-container">
    <h2>Add New Member</h2>
    <form method="POST">
        <div class="form-group">
            <label for="member_id">Member ID:</label>
            <input type="text" id="member_id" name="member_id" placeholder="e.g. MB101" required>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="First name" required>
        </div>
        <div class="form-group">
            <label for="surname">Surname:</label>
            <input type="text" id="surname" name="surname" placeholder="Last name" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. 3331234567">
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="member@sagefit.com">
        </div>
        <div class="form-group">
            <label for="team_code">Team Code:</label>
            <input type="text" id="team_code" name="team_code" placeholder="e.g. Team1" required>
        </div>
        <button type="submit" class="btn">Add Member</button>
        <a href="{{ url_for('index') }}" class="btn">Back</a>
    </form>
</div>
{% endblock %}
