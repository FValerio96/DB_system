{% extends "base.html" %}
{% block title %}Record Booking - StageUp{% endblock %}
{% block content %}
<div class="container form-container">
    <h2>Record New Booking</h2>
    <form method="POST">
        <div class="form-group">
            <label for="booking_id">Booking ID:</label>
            <input type="text" id="booking_id" name="booking_id" placeholder="e.g. BOOK001" required>
        </div>
        <div class="form-group">
            <label for="btype">Booking Type:</label>
            <select id="btype" name="btype" required>
                <option value="one-time">One-Time</option>
                <option value="recurring">Recurring</option>
            </select>
        </div>
        <div class="form-group">
            <label for="booking_date">Date:</label>
            <input type="date" id="booking_date" name="booking_date" required>
        </div>
        <div class="form-group">
            <label for="duration">Duration (hours):</label>
            <input type="number" id="duration" name="duration" min="1" placeholder="e.g. 4" required>
        </div>
        <div class="form-group">
            <label for="cost">Cost (&euro;):</label>
            <input type="number" id="cost" name="cost" min="0" step="0.01" placeholder="e.g. 1200.00" required>
        </div>
        <div class="form-group">
            <label for="method">Booking Method:</label>
            <select id="method" name="method" required>
                <option value="phone">Phone</option>
                <option value="email">Email</option>
                <option value="website">Website</option>
                <option value="postal_mail">Postal Mail</option>
            </select>
        </div>
        <div class="form-group">
            <label for="contract_type">Contract Type:</label>
            <select id="contract_type" name="contract_type" required>
                <option value="one-time">One-Time</option>
                <option value="seasonal">Seasonal</option>
                <option value="promotional">Promotional</option>
            </select>
        </div>
        <div class="form-group">
            <label for="team_code">Team Code:</label>
            <input type="text" id="team_code" name="team_code" placeholder="e.g. Team1" required>
        </div>
        <div class="form-group">
            <label for="customer_id">Customer ID:</label>
            <input type="text" id="customer_id" name="customer_id" placeholder="e.g. Cust1" required>
        </div>
        <div class="form-group">
            <label for="location_id">Event Location ID:</label>
            <input type="text" id="location_id" name="location_id" placeholder="e.g. Loc1" required>
        </div>
        <button type="submit" class="btn">Record Booking</button>
        <a href="{{ url_for('index') }}" class="btn">Back</a>
    </form>
</div>
{% endblock %}
